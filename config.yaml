data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  samples_dir: "data/samples"
  img_size: 512
  num_classes: 6
  ignore_index: 255
  random_seed: 42
  train_split: 0.8
  val_split: 0.1

model:
  architecture: "unet"
  encoder: "resnet34"
  encoder_weights: "imagenet"
  in_channels: 3

training:
  epochs: 30
  batch_size: 8
  learning_rate: 0.0001
  weight_decay: 0.0001
  grad_clip: 1.0
  mixed_precision: true
  checkpoint_dir: "checkpoints"
  log_file: "logs/metrics.csv"

inference:
  default_checkpoint: "checkpoints/best.pth"
  output_dir: "outputs"
  overlay_alpha: 0.45
  min_polygon_area_px: 50

gis:
  default_resolution_m: 0.5
  simplify_tolerance: 0.5
  export_formats: ["geojson", "shapefile"]

class_names:
  - "Urban/Impervious"
  - "Agriculture"
  - "Rangeland"
  - "Forest/Vegetation"
  - "Water"
  - "Barren Land"

class_colors_rgb:
  - [0, 255, 255]
  - [255, 255, 0]
  - [255, 0, 255]
  - [0, 255, 0]
  - [0, 0, 255]
  - [255, 255, 255]
